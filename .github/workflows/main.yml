name: SEBAR Tv - Universal Video to HLS

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Video URL, M3U8, or Torrent'
        required: true
      folder_name:
        description: 'Folder Name English'
        required: true

jobs:
  convert_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc "/usr/local/share/boost" "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Tools
        run: sudo apt-get update && sudo apt-get install -y ffmpeg aria2 curl

      - name: Download Video
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          URL="${{ github.event.inputs.video_url }}"
          
          if [[ "$URL" == *"huggingface.co"* ]]; then
            echo "📥 Hugging Face link detected..."
            URL=$(echo "$URL" | sed 's/ /%20/g')
            pip install huggingface_hub
            echo "import os, sys" > dl.py
            echo "from huggingface_hub import hf_hub_download" >> dl.py
            echo "u = sys.argv[1]" >> dl.py
            echo "p = u.split('/')" >> dl.py
            echo "t = 'dataset' if 'datasets' in p else 'model'" >> dl.py
            echo "r = p[4] + '/' + p[5]" >> dl.py
            echo "m = p.index('main')" >> dl.py
            echo "f = '/'.join(p[m+1:]).replace('%20', ' ')" >> dl.py
            echo "d = hf_hub_download(repo_id=r, filename=f, repo_type=t, token=os.environ['HF_TOKEN'], local_dir='.')" >> dl.py
            echo "os.rename(d, 'input.video')" >> dl.py
            python3 dl.py "$URL"
            
          elif [[ "$URL" == *".m3u8"* ]]; then
            echo "📥 M3U8 link detected..."
            ffmpeg -user_agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" -i "$URL" -c copy -f mpegts input.video
            
          elif [[ "$URL" == *"torrent"* || "$URL" == *"magnet:"* ]]; then
            echo "🧲 Torrent / Magnet link detected..."
            
            if [[ "$URL" == *"http"* && "$URL" == *"torrent"* ]]; then
              echo "📥 Downloading torrent file safely via Curl..."
              curl -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" "$URL" -o file.torrent
              
              echo "🚀 Starting torrent download using official file flag..."
              # بەکارهێنانی فەرمانی فەرمی بۆ خوێندنەوەی فایلی سەر هاردەکە بێ کێشەی ماگنێت
              aria2c --seed-time=0 --summary-interval=15 --bt-stop-timeout=300 --torrent-file=file.torrent
            else
              echo "🚀 Starting magnet link download..."
              aria2c --seed-time=0 --summary-interval=15 --bt-stop-timeout=300 "$URL"
            fi
            
            # فێڵی پایتۆن بۆ دۆزینەوەی فیلمەکە
            python3 -c "
            import os, glob
            files = [f for f in glob.glob('**/*', recursive=True) if os.path.isfile(f) and not f.endswith('.py') and not f.endswith('.yml') and not f.endswith('.torrent')]
            if files:
                biggest = max(files, key=os.path.getsize)
                print(f'🎬 Found movie file: {biggest}')
                os.rename(biggest, 'input.video')
            else:
                print('❌ No file found!')
            "
            
          elif [[ "$URL" == *"iwaatch.com"* ]]; then
            echo "🐢 Slow server detected (iwaatch). Using 4 connections..."
            URL=$(echo "$URL" | sed 's/ /%20/g')
            aria2c -x 4 -s 4 --max-connection-per-server=4 --retry-wait=3 -k 1M -U "Mozilla/5.0" --header="Authorization: Bearer $HF_TOKEN" -d . -o input.video "$URL"
            
          else
            echo "⚖️ Balanced download. Using 8 connections for speed and safety..."
            URL=$(echo "$URL" | sed 's/ /%20/g')
            aria2c -x 8 -s 8 --max-connection-per-server=8 --retry-wait=5 -k 1M -U "Mozilla/5.0" --header="Authorization: Bearer $HF_TOKEN" -d . -o input.video "$URL"
          fi

      - name: Convert, Rename, and Upload
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
        run: |
          mkdir -p output/${FOLDER_NAME}
          
          if [ ! -f input.video ]; then
            echo "❌ Error: input.video does not exist. Download might have failed."
            exit 1
          fi
          
          echo "🎥 Starting FFmpeg Conversion..."
          ffmpeg -probesize 100M -analyzeduration 100M -i input.video -map 0:V:0 -map 0:a? -vf "scale=trunc(iw/2)*2:trunc(ih/2)*2" -c:v libx264 -preset ultrafast -pix_fmt yuv420p -crf 26 -g 60 -sc_threshold 0 -c:a aac -b:a 128k -hls_time 10 -hls_list_size 0 -hls_segment_filename "output/${FOLDER_NAME}/index%d.ts" output/${FOLDER_NAME}/index.m3u8
          
          echo "🔄 Renaming to .safetensors..."
          cd output/${FOLDER_NAME}
          for f in *.ts; do mv "$f" "${f%.ts}.safetensors"; done
          mv index.m3u8 index.safetensors
          sed -i 's/\.ts/\.safetensors/g' index.safetensors
          cd ../..
          
          echo "📊 Checking files before upload:"
          ls -lh output/${FOLDER_NAME} | head -n 10
          
          echo "🚀 Uploading to Hugging Face..."
          pip install -U huggingface_hub
          
          echo "import os" > up.py
          echo "from huggingface_hub import HfApi" >> up.py
          echo "api = HfApi(token=os.environ['HF_TOKEN'])" >> up.py
          echo "folder = os.environ['FOLDER_NAME']" >> up.py
          echo "print('Uploading files, please wait...')" >> up.py
          echo "api.upload_folder(folder_path=f'output/{folder}', repo_id='Sarko717227/Ai_SMART', repo_type='dataset', path_in_repo=folder)" >> up.py
          
          python3 up.py
          echo "✅ هەموو شتێک بە سەرکەوتوویی کۆتایی هات!"
