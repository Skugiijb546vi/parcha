name: SEBAR Tv - Universal Video to HLS

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Video URL or M3U8'
        required: true
      folder_name:
        description: 'Folder Name English'
        required: true

jobs:
  convert_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download Video
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          URL="${{ github.event.inputs.video_url }}"
          echo "Target URL: $URL"
          
          if [[ "$URL" == *".m3u8"* ]]; then
            echo "Downloading M3U8 stream..."
            ffmpeg -user_agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" -i "$URL" -c copy input.mp4
          else
            echo "Downloading Direct URL..."
            # بەکارهێنانی curl لەبری wget بۆ بەهێزترکردنی پڕۆسەی ڕاکێشانی فایلەکان
            curl -L -f -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                 -H "Authorization: Bearer $HF_TOKEN" \
                 -H "Referer: $URL" \
                 -o input.mp4 "$URL"
            
            # پشکنین: دڵنیابوونەوە لەوەی فایلەکە بە تەواوی دابەزیوە
            if [ ! -f "input.mp4" ]; then
              echo "Error: Download failed entirely."
              exit 1
            fi
            
            # پشکنین: ئەگەر قەبارەی فایلەکە لە 1 مێگابایت کەمتر بوو، واتە لینکەکە بلۆک کراوە
            FILE_SIZE=$(stat -c%s "input.mp4")
            if [ "$FILE_SIZE" -lt 1048576 ]; then
              echo "Error: Downloaded file is too small ($FILE_SIZE bytes). The CDN likely blocked the request or the link is expired/invalid."
              cat input.mp4
              exit 1
            fi
            echo "Download successful! Size: $FILE_SIZE bytes."
          fi

      - name: Create HLS Chunks
        run: |
          mkdir -p output/${{ github.event.inputs.folder_name }}
          # ئێستا ڕاستەوخۆ مامەڵە لەگەڵ input.mp4 دەکات
          ffmpeg -i input.mp4 -map 0:V:0 -map 0:a? -vf "scale=trunc(iw/2)*2:trunc(ih/2)*2" -c:v libx264 -preset ultrafast -pix_fmt yuv420p -crf 26 -g 60 -sc_threshold 0 -c:a aac -b:a 128k -hls_time 10 -hls_list_size 0 -hls_segment_filename "output/${{ github.event.inputs.folder_name }}/index%d.ts" output/${{ github.event.inputs.folder_name }}/index.m3u8

      - name: Rename Extensions to .safetensors
        run: |
          cd output/${{ github.event.inputs.folder_name }}
          for f in *.ts; do mv "$f" "${f%.ts}.safetensors"; done
          mv index.m3u8 index.safetensors
          sed -i 's/\.ts/\.safetensors/g' index.safetensors

      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install huggingface_hub
          python -c "import os; from huggingface_hub import HfApi; api = HfApi(token=os.environ['HF_TOKEN']); api.upload_folder(folder_path='output/${{ github.event.inputs.folder_name }}', repo_id='Sarko717227/Ai_SMART', repo_type='dataset', path_in_repo='${{ github.event.inputs.folder_name }}')"
