name: SEBAR Tv - Universal Video to HLS

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Video URL or M3U8 (Full Movie)'
        required: true
      folder_name:
        description: 'Folder Name English'
        required: true

jobs:
  convert_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download Video
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          URL="${{ github.event.inputs.video_url }}"
          URL=$(echo "$URL" | sed 's/ /%20/g')
          
          echo "Starting download..."
          
          if [[ "$URL" == *"huggingface.co"* ]]; then
            echo "Hugging Face link detected!"
            pip install huggingface_hub
            
            # دروستکردنی فایلی پایتۆن بە سەربەخۆیی بۆ ڕێگریکردن لە کێشەی سینتاکس
            cat << 'EOF' > download_script.py
import os
import sys
from huggingface_hub import hf_hub_download

url = sys.argv[1]
parts = url.split('/')

repo_type = 'dataset' if 'datasets' in parts else 'model'
repo_id = parts[4] + '/' + parts[5]
main_idx = parts.index('main')
filename = '/'.join(parts[main_idx+1:])
filename = filename.replace('%20', ' ')

print(f'Downloading: {filename} from {repo_id}')
download_path = hf_hub_download(repo_id=repo_id, filename=filename, repo_type=repo_type, token=os.environ['HF_TOKEN'], local_dir='.')

# گۆڕینی ناوەکە بۆ ts بۆ ئەوەی FFmpeg بێ کێشە بیخوێنێتەوە
os.rename(download_path, 'input.ts')
EOF
            python3 download_script.py "$URL"
            
          elif [[ "$URL" == *".m3u8"* ]]; then
            echo "M3U8 link detected!"
            ffmpeg -user_agent "Mozilla/5.0" -i "$URL" -c copy input.ts
          else
            echo "Direct link detected!"
            curl -L -A "Mozilla/5.0" -H "Authorization: Bearer $HF_TOKEN" -o input.ts "$URL"
          fi
          
          # پشکنینی قەبارە
          FILE_SIZE=$(stat -c%s "input.ts" 2>/dev/null || echo 0)
          echo "Downloaded File Size: $FILE_SIZE bytes"
          
          if [ "$FILE_SIZE" -lt 5000000 ]; then
            echo "❌ Error: File is too small! The real video was not downloaded."
            cat input.ts
            exit 1
          fi
          echo "✅ Download successful."

      - name: Create HLS Chunks
        run: |
          mkdir -p output/${{ github.event.inputs.folder_name }}
          ffmpeg -i input.ts -map 0:V:0 -map 0:a? -vf "scale=trunc(iw/2)*2:trunc(ih/2)*2" -c:v libx264 -preset ultrafast -pix_fmt yuv420p -crf 26 -g 60 -sc_threshold 0 -c:a aac -b:a 128k -hls_time 10 -hls_list_size 0 -hls_segment_filename "output/${{ github.event.inputs.folder_name }}/index%d.ts" output/${{ github.event.inputs.folder_name }}/index.m3u8

      - name: Rename Extensions to .safetensors
        run: |
          cd output/${{ github.event.inputs.folder_name }}
          for f in *.ts; do mv "$f" "${f%.ts}.safetensors"; done
          mv index.m3u8 index.safetensors
          sed -i 's/\.ts/\.safetensors/g' index.safetensors

      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
        run: |
          pip install huggingface_hub
          
          cat << 'EOF' > upload_script.py
import os
from huggingface_hub import HfApi

api = HfApi(token=os.environ['HF_TOKEN'])
folder = os.environ['FOLDER_NAME']

api.upload_folder(
    folder_path=f'output/{folder}',
    repo_id='Sarko717227/Ai_SMART',
    repo_type='dataset',
    path_in_repo=folder
)
EOF
          python3 upload_script.py
