name: SEBAR Tv - Universal Video to HLS

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'Direct Video URL or M3U8'
        required: true
      folder_name:
        description: 'Folder Name English'
        required: true

jobs:
  convert_and_upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Download Video
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          URL="${{ github.event.inputs.video_url }}"
          URL=$(echo "$URL" | sed 's/ /%20/g')
          
          if [[ "$URL" == *"huggingface.co"* ]]; then
            pip install huggingface_hub
            cat << 'EOF' > dl.py
          import os, sys
          from huggingface_hub import hf_hub_download
          u = sys.argv[1]
          p = u.split('/')
          t = 'dataset' if 'datasets' in p else 'model'
          r = p[4] + '/' + p[5]
          m = p.index('main')
          f = '/'.join(p[m+1:]).replace('%20', ' ')
          d = hf_hub_download(repo_id=r, filename=f, repo_type=t, token=os.environ['HF_TOKEN'], local_dir='.')
          os.rename(d, 'input.ts')
          EOF
            python3 dl.py "$URL"
          elif [[ "$URL" == *".m3u8"* ]]; then
            ffmpeg -user_agent "Mozilla/5.0" -i "$URL" -c copy input.ts
          else
            curl -L -A "Mozilla/5.0" -H "Authorization: Bearer $HF_TOKEN" -o input.ts "$URL"
          fi
          
          SIZE=$(stat -c%s "input.ts" 2>/dev/null || echo 0)
          if [ "$SIZE" -lt 5000000 ]; then
            exit 1
          fi

      - name: Create HLS Chunks
        run: |
          mkdir -p output/${{ github.event.inputs.folder_name }}
          # لێرەدا بە زەبری هێز (-f mpegts) پێی دەڵێین کە ئەمە ڤیدیۆیە نەک وێنە
          ffmpeg -f mpegts -i input.ts -map 0:V:0 -map 0:a? -vf "scale=trunc(iw/2)*2:trunc(ih/2)*2" -c:v libx264 -preset ultrafast -pix_fmt yuv420p -crf 26 -g 60 -sc_threshold 0 -c:a aac -b:a 128k -hls_time 10 -hls_list_size 0 -hls_segment_filename "output/${{ github.event.inputs.folder_name }}/index%d.ts" output/${{ github.event.inputs.folder_name }}/index.m3u8

      - name: Rename Extensions to .safetensors
        run: |
          cd output/${{ github.event.inputs.folder_name }}
          for f in *.ts; do mv "$f" "${f%.ts}.safetensors"; done
          mv index.m3u8 index.safetensors
          sed -i 's/\.ts/\.safetensors/g' index.safetensors

      - name: Upload to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          FOLDER_NAME: ${{ github.event.inputs.folder_name }}
        run: |
          pip install huggingface_hub
          cat << 'EOF' > up.py
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ['HF_TOKEN'])
          folder = os.environ['FOLDER_NAME']
          api.upload_folder(folder_path=f'output/{folder}', repo_id='Sarko717227/Ai_SMART', repo_type='dataset', path_in_repo=folder)
          EOF
          python3 up.py
